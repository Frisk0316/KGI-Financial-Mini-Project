<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knowledge Shredder — 凱基金融科技</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

<!-- ===== Loading Overlay ===== -->
<div id="loading-overlay" class="d-none">
  <div class="spinner-border text-light mb-3" role="status" style="width:3rem;height:3rem;"></div>
  <p id="loading-message" class="fs-5 text-light">處理中...</p>
</div>

<!-- ===== Navbar ===== -->
<nav class="navbar navbar-dark bg-primary">
  <div class="container-fluid">
    <span class="navbar-brand fw-bold">
      <i class="bi bi-scissors me-2"></i>Knowledge Shredder
    </span>
    <span class="text-white-50 small">凱基金融科技 · 微學習內容生成平台</span>
  </div>
</nav>

<!-- ===== Main ===== -->
<div class="container py-4" style="max-width:960px;">

  <!-- Global error alert -->
  <div id="error-alert" class="alert alert-danger alert-dismissible d-none" role="alert">
    <i class="bi bi-exclamation-triangle-fill me-2"></i>
    <span id="error-message"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <!-- ===== Step 1: Upload ===== -->
  <div class="card mb-4 shadow-sm">
    <div class="card-header bg-white fw-semibold">
      <span class="badge bg-primary me-2">1</span>上傳訓練文件
    </div>
    <div class="card-body">
      <div id="upload-zone" tabindex="0" role="button" aria-label="點擊或拖放檔案至此">
        <i class="bi bi-cloud-arrow-up fs-1 text-secondary"></i>
        <p class="mt-2 mb-1 fw-semibold">拖放文件至此，或點擊選擇</p>
        <p class="text-muted small mb-0">支援 PDF、DOCX、TXT，最大 16 MB</p>
        <input type="file" id="file-input" accept=".pdf,.docx,.txt" class="d-none" />
      </div>

      <!-- File info bar (hidden until upload) -->
      <div id="file-info" class="d-none mt-3 p-3 bg-light rounded d-flex align-items-center gap-3">
        <i class="bi bi-file-earmark-check-fill text-success fs-4"></i>
        <div>
          <div id="file-name" class="fw-semibold"></div>
          <div id="char-count" class="text-muted small"></div>
        </div>
        <button class="btn btn-sm btn-outline-secondary ms-auto" id="btn-clear-file">
          <i class="bi bi-x"></i> 清除
        </button>
      </div>
    </div>
  </div>

  <!-- ===== Step 2: Domain Tags ===== -->
  <div class="card mb-4 shadow-sm">
    <div class="card-header bg-white fw-semibold">
      <span class="badge bg-primary me-2">2</span>選擇知識領域標籤
    </div>
    <div class="card-body">
      <p class="text-muted small mb-3">請至少選擇一個領域。LLM 將依據所選領域調整內容語調與重點。</p>

      <!-- Search -->
      <div class="input-group mb-3">
        <span class="input-group-text"><i class="bi bi-search"></i></span>
        <input type="text" id="domain-search" class="form-control" placeholder="搜尋領域..." />
      </div>

      <!-- Domain checkboxes -->
      <div id="domain-list" class="domain-checkbox-list mb-3"></div>

      <!-- Selected tags pills -->
      <div id="selected-tags" class="d-flex flex-wrap gap-2 mt-2"></div>

      <!-- Warning -->
      <div id="domain-warning" class="text-warning small mt-2 d-none">
        <i class="bi bi-exclamation-circle me-1"></i>請至少選擇一個領域標籤。
      </div>
    </div>
  </div>

  <!-- ===== Step 3: Generate ===== -->
  <div class="d-grid mb-5">
    <button id="btn-generate" class="btn btn-primary btn-lg" disabled>
      <i class="bi bi-lightning-charge-fill me-2"></i>生成學習微模組 (Generate Sprints)
    </button>
  </div>

  <!-- ===== Split-Screen Preview ===== -->
  <div id="split-screen" class="d-none">
    <hr />
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="mb-0"><i class="bi bi-layout-split me-2"></i>預覽結果</h5>
      <div id="summary-badge" class="text-muted small fst-italic"></div>
    </div>
    <div class="row g-3">
      <!-- Left: raw text -->
      <div class="col-md-6">
        <div class="split-panel-header">
          <i class="bi bi-file-text me-1"></i>原始文件內容
        </div>
        <pre id="raw-text-panel" class="split-pane raw-text-panel"></pre>
      </div>
      <!-- Right: sprints -->
      <div class="col-md-6">
        <div class="split-panel-header d-flex justify-content-between align-items-center">
          <span><i class="bi bi-stars me-1"></i>LLM 生成學習微模組</span>
          <div id="domain-pills" class="d-flex flex-wrap gap-1"></div>
        </div>
        <div id="sprint-panel" class="split-pane sprint-panel"></div>
      </div>
    </div>
  </div>

</div><!-- /container -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
